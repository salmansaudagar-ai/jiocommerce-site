<svg viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="jioGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#635BFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F172A;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1200" fill="url(#jioGradient)"/>

  <!-- Decorative circles -->
  <circle cx="200" cy="200" r="150" fill="#10B981" opacity="0.1"/>
  <circle cx="1000" cy="1000" r="200" fill="#3B82F6" opacity="0.1"/>
  <circle cx="600" cy="100" r="100" fill="#F59E0B" opacity="0.05"/>

  <!-- Logo Mark - "J" -->
  <g filter="url(#shadow)">
    <text
      x="600"
      y="700"
      font-size="400"
      font-weight="bold"
      text-anchor="middle"
      dominant-baseline="middle"
      fill="white"
      font-family="Inter, system-ui, sans-serif"
      letter-spacing="-10"
    >
      J
    </text>

    <!-- Accent line -->
    <line
      x1="400"
      y1="800"
      x2="800"
      y2="800"
      stroke="white"
      stroke-width="8"
      stroke-linecap="round"
      opacity="0.8"
    />

    <!-- Brand name -->
    <text
      x="600"
      y="950"
      font-size="60"
      text-anchor="middle"
      fill="white"
      font-family="Inter, system-ui, sans-serif"
      font-weight="600"
      letter-spacing="2"
    >
      JIO COMMERCE
    </text>
  </g>
</svg>
